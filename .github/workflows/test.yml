name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile guard
        run: python -m py_compile skills/github-pr-review-policy/scripts/pr_review_guard.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
